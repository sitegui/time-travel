<!DOCTYPE html>
<html>

<head>
	<title>Time Travel</title>
	<meta charset="UTF-8">
	<meta name="description" content="Time your commutes to find the best route">
	<meta name="keywords" content="">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="css.css">
	<script src="Screen.js"></script>
</head>

<body>
	<header>
		<h1>Time Travel</h1>
	</header>

	<div id="screen-commutes">
		<div class="commute-add">Add</div>
		<div id="commutes"></div>
		<template id="template-commute">
			<div class="commute" data-name></div>
		</template>
	</div>

	<div id="screen-routes">
		<p>Commute: <span class="commute-name"></span></p>
		<div class="route-add">Add</div>
		<div id="routes"></div>
		<template id="template-route">
			<div class="route">
				<span data-name></span>
				<span data-time class="route-time"></span>
			</div>
		</template>
	</div>

	<div id="screen-route">
		<p>Commute: <span class="commute-name"></span>
			<br>Route: <span class="route-name"></span>
		</p>
		<div class="start-timer">Start timer</div>
	</div>

	<div id="screen-timer">
		<div class="time">
			<span class="time-minutes">12</span>:<span class="time-seconds">34</span>
		</div>
		<div class="stop-timer">Stop and save</div>
		<div class="cancel-timer-container">
			<div class="cancel-timer">Cancel</div>
		</div>
	</div>

	<footer><a href="https://github.com/sitegui/time-travel">Fork me</a></footer>
	<script src="js.js"></script>
</body>

</html>
